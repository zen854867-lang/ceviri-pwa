name: Download Models

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Download en-tr model
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('Xenova/opus-mt-en-tr', local_dir='models/en-tr')
          "

      - name: Download ja-en model
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('Xenova/opus-mt-ja-en', local_dir='models/ja-en')
          "

      - name: Commit models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}
          git add models/
          git commit -m "Add offline models" || echo "Nothing to commit"
          git push
