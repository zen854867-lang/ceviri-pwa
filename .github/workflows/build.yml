name: Download Models

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface-hub requests

      - name: Download models
        run: |
          python3 << 'PYEOF'
          import os, requests
          
          def download(url, path):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              r = requests.get(url, allow_redirects=True)
              if r.status_code == 200:
                  open(path, 'wb').write(r.content)
                  print(f"OK: {path}")
              else:
                  print(f"SKIP: {url} -> {r.status_code}")
          
          base_en = "https://huggingface.co/Xenova/opus-mt-en-tr/resolve/main"
          base_ja = "https://huggingface.co/Xenova/opus-mt-ja-en/resolve/main"
          
          files = ["onnx/encoder_model.onnx", "onnx/decoder_model.onnx", "tokenizer.json", "tokenizer_config.json", "vocab.json", "source.spm", "target.spm"]
          
          for f in files:
              download(f"{base_en}/{f}", f"models/en-tr/{f}")
              download(f"{base_ja}/{f}", f"models/ja-en/{f}")
          PYEOF

      - name: Commit models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}
          git lfs install
          git lfs track "*.onnx"
          git add .gitattributes
          git add models/
          git commit -m "Add offline models" || echo "Nothing to commit"
          git push
